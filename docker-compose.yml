version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: stephano_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stephano
      POSTGRES_PASSWORD: stephano_secret
      POSTGRES_DB: stephano_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stephano -d stephano_db']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stephano_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://stephano:stephano_secret@db:5432/stephano_db?schema=public
      JWT_SECRET: change-this-in-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
